# ===========================================================================
# Node-RED — Visual flow-based programming for IoT and home automation
# Port: 1880
# Docs: https://nodered.org/docs/getting-started/docker
#
# Drag-and-drop automation flows that wire together MQTT, HTTP, WebSocket,
# databases, Home Assistant, and hundreds of other services.
# Pairs well with Mosquitto (MQTT) and Home Assistant.
#
# Quick start:
#   1. cp .env.example .env
#   2. make up SERVICE=home/node-red
#   3. Open http://<server-ip>:1880
# ===========================================================================

services:
  node-red:
    image: nodered/node-red:latest
    container_name: node-red
    restart: unless-stopped
    pull_policy: always
    user: "1000:1000"    # run as non-root; change to match PUID:PGID
    environment:
      TZ: ${TZ:-America/New_York}
      NODE_RED_ENABLE_PROJECTS: "true"
      # Uncomment to enable credential encryption:
      # NODE_RED_CREDENTIAL_SECRET: ${NODE_RED_SECRET}
    volumes:
      - ${DATA_PATH:-/mnt/nas/appdata}/node-red/data:/data
    ports:
      - "${NODE_RED_PORT:-1880}:1880"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:1880/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - homelab

networks:
  homelab:
    external: true
