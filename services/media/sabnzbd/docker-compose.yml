# ===========================================================================
# SABnzbd — Usenet binary newsreader and download client
# Port: 7470
# Docs: https://sabnzbd.org/wiki/
#
# Downloads NZB files from Usenet newsgroups. Works alongside qBittorrent
# for a torrent+Usenet dual-stack setup with Radarr and Sonarr.
#
# Requires a Usenet provider subscription (e.g. Newshosting, Eweka, etc.)
#
# Quick start:
#   1. cp .env.example .env
#   2. make up SERVICE=media/sabnzbd
#   3. Open http://<server-ip>:7470
#   4. Add your Usenet server credentials under Config → Servers
# ===========================================================================

services:
  sabnzbd:
    image: lscr.io/linuxserver/sabnzbd:latest
    container_name: sabnzbd
    restart: unless-stopped
    pull_policy: always
    environment:
      TZ: ${TZ:-America/New_York}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    volumes:
      - ${DATA_PATH:-/mnt/nas/appdata}/sabnzbd/config:/config
      - ${NAS_PATH:-/mnt/nas}/downloads:/downloads
      - ${NAS_PATH:-/mnt/nas}/downloads/incomplete:/incomplete-downloads
    ports:
      - "${SABNZBD_PORT:-7470}:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - homelab

networks:
  homelab:
    external: true
