# ===========================================================================
# Prowlarr — Indexer manager for Radarr / Sonarr / Lidarr / Readarr
# Port: 9696
# Docs: https://wiki.servarr.com/prowlarr
#
# Centralises all your torrent and Usenet indexers in one place and syncs
# them automatically to your arr apps (Radarr, Sonarr, etc.).
#
# Quick start:
#   1. cp .env.example .env
#   2. make up SERVICE=media/prowlarr
#   3. Open http://<server-ip>:9696
#   4. Add indexers, then sync to Radarr/Sonarr via Settings → Apps
# ===========================================================================

services:
  prowlarr:
    image: lscr.io/linuxserver/prowlarr:latest
    container_name: prowlarr
    restart: unless-stopped
    pull_policy: always
    environment:
      TZ: ${TZ:-America/New_York}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    volumes:
      - ${DATA_PATH:-/mnt/nas/appdata}/prowlarr/config:/config
    ports:
      - "${PROWLARR_PORT:-9696}:9696"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9696/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - homelab

networks:
  homelab:
    external: true
