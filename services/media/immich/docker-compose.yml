# ===========================================================================
# Immich — Self-hosted photo & video management
# Port: 2283
# GPU:  1 (RTX 3080 Ti, 12 GB) for ML inference (face detection, CLIP, tags)
# Docs: https://immich.app
# ===========================================================================
#
# Quick start:
#   1. cp .env.example .env  (fill in passwords and paths)
#   2. mkdir -p ${DATA_PATH:-/mnt/nas/appdata}/immich/{upload,postgres,model-cache}
#   3. docker compose up -d
#   4. Open http://<your-server-ip>:2283 and create your admin account
#
# To add an external photo library:
#   - Mount the directory in immich-server volumes (see example below)
#   - Create an External Library in Admin UI → Libraries

name: immich

services:

  immich-server:
    container_name: immich_server
    image: ghcr.io/immich-app/immich-server:${IMMICH_VERSION:-release}
    environment:
      TZ: ${TZ:-America/New_York}
    volumes:
      - ${UPLOAD_LOCATION}:/usr/src/app/upload
      - /etc/localtime:/etc/localtime:ro
      # Uncomment and update to add an external read-only photo library:
      # - /path/to/your/photos:/mnt/media/photos:ro
    env_file:
      - .env
    ports:
      - "${IMMICH_PORT:-2283}:2283"
    depends_on:
      redis:
        condition: service_healthy
      database:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - immich_internal
      - homelab

  immich-machine-learning:
    container_name: immich_machine_learning
    # CUDA image for GPU-accelerated face detection, CLIP embeddings, and object tagging.
    # Remove the -cuda suffix and delete the deploy block below to run on CPU only.
    image: ghcr.io/immich-app/immich-machine-learning:${IMMICH_VERSION:-release}-cuda
    environment:
      TZ: ${TZ:-America/New_York}
      NVIDIA_DRIVER_CAPABILITIES: compute,utility
    volumes:
      - ${MODEL_CACHE_LOCATION}:/cache
    env_file:
      - .env
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["1"]         # GPU 1 — RTX 3080 Ti (12 GB); adjust for your hardware
              capabilities: [gpu]
    restart: unless-stopped
    labels:
      gpu: "true"
    networks:
      - immich_internal

  redis:
    container_name: immich_redis
    image: docker.io/valkey/valkey:9
    environment:
      TZ: ${TZ:-America/New_York}
    healthcheck:
      test: redis-cli ping || exit 1
    restart: unless-stopped
    networks:
      - immich_internal

  database:
    container_name: immich_postgres
    image: ghcr.io/immich-app/postgres:14-vectorchord0.4.3-pgvectors0.2.0
    environment:
      TZ: ${TZ:-America/New_York}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_USER: ${DB_USERNAME}
      POSTGRES_DB: ${DB_DATABASE_NAME}
      POSTGRES_INITDB_ARGS: "--data-checksums"
      DB_STORAGE_TYPE: "HDD"            # Change to "SSD" if your data is on an SSD
    volumes:
      - ${DB_DATA_LOCATION}:/var/lib/postgresql/data
    shm_size: 128mb
    restart: unless-stopped
    networks:
      - immich_internal

networks:
  immich_internal:
    driver: bridge
  homelab:
    external: true
