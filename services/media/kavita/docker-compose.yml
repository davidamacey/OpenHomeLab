# ===========================================================================
# Kavita — Self-hosted digital library for manga, comics, and books
# Port: 7480
# Docs: https://wiki.kavitareader.com
#
# Supports CBZ, CBR, PDF, EPUB, and raw images. Features reading progress
# tracking, series grouping, OPDS support, and a built-in reader.
#
# Quick start:
#   1. cp .env.example .env
#   2. make up SERVICE=media/kavita
#   3. Open http://<server-ip>:7480
# ===========================================================================

services:
  kavita:
    image: lscr.io/linuxserver/kavita:latest
    container_name: kavita
    restart: unless-stopped
    pull_policy: always
    environment:
      TZ: ${TZ:-America/New_York}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    volumes:
      - ${DATA_PATH:-/mnt/nas/appdata}/kavita/config:/config
      - ${NAS_PATH:-/mnt/nas}/media/manga:/manga
      - ${NAS_PATH:-/mnt/nas}/media/comics:/comics
      - ${NAS_PATH:-/mnt/nas}/media/books:/books
    ports:
      - "${KAVITA_PORT:-7480}:5000"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - homelab

networks:
  homelab:
    external: true
