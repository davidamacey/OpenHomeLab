# ===========================================================================
# Bazarr — Automatic subtitle management for Radarr and Sonarr
# Port: 6767
# Docs: https://wiki.bazarr.media
#
# Automatically downloads subtitles for your movies and TV shows from
# providers like OpenSubtitles, Subscene, and more. Integrates directly
# with Radarr and Sonarr.
#
# Quick start:
#   1. cp .env.example .env
#   2. make up SERVICE=media/bazarr
#   3. Open http://<server-ip>:6767
#   4. Configure Sonarr/Radarr connections under Settings → Sonarr / Radarr
# ===========================================================================

services:
  bazarr:
    image: lscr.io/linuxserver/bazarr:latest
    container_name: bazarr
    restart: unless-stopped
    pull_policy: always
    environment:
      TZ: ${TZ:-America/New_York}
      PUID: ${PUID:-1000}
      PGID: ${PGID:-1000}
    volumes:
      - ${DATA_PATH:-/mnt/nas/appdata}/bazarr/config:/config
      - ${NAS_PATH:-/mnt/nas}/media/movies:/movies
      - ${NAS_PATH:-/mnt/nas}/media/tvshows:/tv
    ports:
      - "${BAZARR_PORT:-6767}:6767"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6767"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - homelab

networks:
  homelab:
    external: true
