# ===========================================================================
# n8n — Workflow automation with 400+ integrations
# Port: 5678
# Docs: https://docs.n8n.io/hosting/installation/docker/
#
# Visual workflow automation: connect APIs, databases, AI models, home
# automation, notifications, and more without writing code.
# Supports webhooks, cron triggers, and AI agent workflows.
#
# Quick start:
#   1. cp .env.example .env
#   2. Set N8N_ENCRYPTION_KEY and N8N_BASIC_AUTH_PASSWORD
#   3. make up SERVICE=utilities/n8n
#   4. Open http://<server-ip>:5678
# ===========================================================================

services:
  n8n-db:
    image: postgres:17-alpine
    container_name: n8n-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${N8N_DBNAME:-n8n}
      POSTGRES_USER: ${N8N_DBUSER:-n8n}
      POSTGRES_PASSWORD: ${N8N_DBPASS}
    volumes:
      - n8n_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${N8N_DBNAME:-n8n} -U ${N8N_DBUSER:-n8n}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - n8n_internal

  n8n:
    image: docker.io/n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    pull_policy: always
    depends_on:
      n8n-db:
        condition: service_healthy
    environment:
      TZ: ${TZ:-America/New_York}
      GENERIC_TIMEZONE: ${TZ:-America/New_York}
      N8N_ENCRYPTION_KEY: ${N8N_ENCRYPTION_KEY}          # REQUIRED: random string
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: n8n-db
      DB_POSTGRESDB_PORT: "5432"
      DB_POSTGRESDB_DATABASE: ${N8N_DBNAME:-n8n}
      DB_POSTGRESDB_USER: ${N8N_DBUSER:-n8n}
      DB_POSTGRESDB_PASSWORD: ${N8N_DBPASS}
      N8N_HOST: ${N8N_HOST:-localhost}
      N8N_PORT: "5678"
      N8N_PROTOCOL: http
      WEBHOOK_URL: http://${N8N_HOST:-localhost}:${N8N_PORT:-5678}/
      # Basic auth (optional but recommended)
      N8N_BASIC_AUTH_ACTIVE: ${N8N_BASIC_AUTH_ACTIVE:-true}
      N8N_BASIC_AUTH_USER: ${N8N_BASIC_AUTH_USER:-admin}
      N8N_BASIC_AUTH_PASSWORD: ${N8N_BASIC_AUTH_PASSWORD}
    volumes:
      - ${DATA_PATH:-/mnt/nas/appdata}/n8n/data:/home/node/.n8n
    ports:
      - "${N8N_PORT:-5678}:5678"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:5678/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - n8n_internal
      - homelab

volumes:
  n8n_db:

networks:
  n8n_internal:
    driver: bridge
  homelab:
    external: true
