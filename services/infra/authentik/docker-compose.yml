# ===========================================================================
# Authentik — Identity provider / SSO for all homelab services
# Port: 9300 (HTTP), 9443 (HTTPS)
# Docs: https://docs.goauthentik.io
#
# Use Authentik to add SSO, MFA, and access control to every service.
# Works with: Nginx Proxy Manager, Traefik, and any OIDC/SAML-aware app.
#
# Quick start:
#   1. cp .env.example .env  (generate secure AUTHENTIK_SECRET_KEY and passwords)
#   2. docker compose up -d
#   3. Visit http://<server-ip>:9300/if/flow/initial-setup/
#   4. Create your admin account
# ===========================================================================

services:

  authentik-postgresql:
    image: docker.io/library/postgres:17-alpine
    container_name: authentik-postgresql
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${POSTGRES_DB:-authentik} -U ${POSTGRES_USER:-authentik}"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 5s
    volumes:
      - authentik_postgres:/var/lib/postgresql/data
    environment:
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_USER: ${POSTGRES_USER:-authentik}
      POSTGRES_DB: ${POSTGRES_DB:-authentik}
    networks:
      - authentik_internal

  authentik-redis:
    image: docker.io/library/redis:alpine
    container_name: authentik-redis
    command: --save 60 1 --loglevel warning
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping | grep PONG"]
      start_period: 20s
      interval: 30s
      retries: 5
      timeout: 3s
    volumes:
      - authentik_redis:/data
    networks:
      - authentik_internal

  authentik-server:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2025.6.1}
    container_name: authentik-server
    restart: unless-stopped
    command: server
    environment:
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__USER: ${POSTGRES_USER:-authentik}
      AUTHENTIK_POSTGRESQL__NAME: ${POSTGRES_DB:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${POSTGRES_PASSWORD}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
      AUTHENTIK_EMAIL__HOST: ${EMAIL_HOST:-}
      AUTHENTIK_EMAIL__PORT: ${EMAIL_PORT:-587}
      AUTHENTIK_EMAIL__USERNAME: ${EMAIL_USERNAME:-}
      AUTHENTIK_EMAIL__PASSWORD: ${EMAIL_PASSWORD:-}
      AUTHENTIK_EMAIL__FROM: ${EMAIL_FROM:-authentik@homelab.local}
    volumes:
      - authentik_media:/media
      - authentik_templates:/templates
    ports:
      - "${AUTHENTIK_HTTP_PORT:-9300}:9000"
      - "${AUTHENTIK_HTTPS_PORT:-9443}:9443"
    depends_on:
      authentik-postgresql:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    networks:
      - authentik_internal
      - homelab

  authentik-worker:
    image: ghcr.io/goauthentik/server:${AUTHENTIK_TAG:-2025.6.1}
    container_name: authentik-worker
    restart: unless-stopped
    command: worker
    environment:
      AUTHENTIK_REDIS__HOST: authentik-redis
      AUTHENTIK_POSTGRESQL__HOST: authentik-postgresql
      AUTHENTIK_POSTGRESQL__USER: ${POSTGRES_USER:-authentik}
      AUTHENTIK_POSTGRESQL__NAME: ${POSTGRES_DB:-authentik}
      AUTHENTIK_POSTGRESQL__PASSWORD: ${POSTGRES_PASSWORD}
      AUTHENTIK_SECRET_KEY: ${AUTHENTIK_SECRET_KEY}
    user: root    # worker needs root for Docker socket access (optional)
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - authentik_media:/media
      - authentik_certs:/certs
      - authentik_templates:/templates
    depends_on:
      authentik-postgresql:
        condition: service_healthy
      authentik-redis:
        condition: service_healthy
    networks:
      - authentik_internal

volumes:
  authentik_postgres:
  authentik_redis:
  authentik_media:
  authentik_certs:
  authentik_templates:

networks:
  authentik_internal:
    driver: bridge
  homelab:
    external: true
