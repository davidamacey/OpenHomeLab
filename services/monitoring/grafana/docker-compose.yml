# ===========================================================================
# Grafana + Prometheus — Metrics collection and dashboards
#
# Services:
#   - prometheus  : Metrics collection and storage   (port 9090)
#   - grafana     : Dashboard and visualization      (port 3002)
#
# Useful dashboards to import from grafana.com:
#   - 1860  : Node Exporter Full (system metrics)
#   - 11074 : Node Exporter for Prometheus (simpler)
#   - 12239 : Docker Prometheus Monitoring
#   - 14574 : NVIDIA DCGM Exporter Dashboard (GPU metrics)
#
# Docs:
#   - Prometheus: https://prometheus.io/docs/
#   - Grafana:    https://grafana.com/docs/grafana/latest/
# ===========================================================================

services:

  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    restart: unless-stopped
    pull_policy: always
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ${PROMETHEUS_CONFIG_PATH:-./prometheus.yml}:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-30d}
      - --web.enable-lifecycle
    environment:
      TZ: ${TZ:-America/New_York}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - monitoring_internal
      - homelab

  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    restart: unless-stopped
    pull_policy: always
    ports:
      - "${GRAFANA_PORT:-3002}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    environment:
      TZ: ${TZ:-America/New_York}
      GF_SECURITY_ADMIN_USER: ${GRAFANA_ADMIN_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_SERVER_ROOT_URL: http://localhost:${GRAFANA_PORT:-3002}
    depends_on:
      - prometheus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - monitoring_internal
      - homelab

  # ---------------------------------------------------------------------------
  # Node Exporter — system metrics (CPU, memory, disk, network)
  # ---------------------------------------------------------------------------
  node-exporter:
    image: prom/node-exporter:latest
    container_name: node-exporter
    restart: unless-stopped
    pid: host
    network_mode: host
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - --path.procfs=/host/proc
      - --path.rootfs=/rootfs
      - --path.sysfs=/host/sys
      - --collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)

  # ---------------------------------------------------------------------------
  # cAdvisor — Docker container metrics
  # ---------------------------------------------------------------------------
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: cadvisor
    restart: unless-stopped
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "${CADVISOR_PORT:-8080}:8080"
    devices:
      - /dev/kmsg
    networks:
      - monitoring_internal
      - homelab

  # ---------------------------------------------------------------------------
  # NVIDIA DCGM Exporter — GPU metrics (VRAM, utilization, temp)
  # Requires: NVIDIA driver + Container Toolkit
  # ---------------------------------------------------------------------------
  dcgm-exporter:
    image: nvcr.io/nvidia/k8s/dcgm-exporter:latest
    container_name: dcgm-exporter
    restart: unless-stopped
    runtime: nvidia
    environment:
      NVIDIA_VISIBLE_DEVICES: all
    ports:
      - "${DCGM_PORT:-9400}:9400"
    labels:
      gpu: "true"
    networks:
      - monitoring_internal
      - homelab

volumes:
  prometheus_data:
  grafana_data:

networks:
  monitoring_internal:
    driver: bridge
  homelab:
    external: true
