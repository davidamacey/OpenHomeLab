# ===========================================================================
# Prometheus — Scrape configuration
# Edit this file to add or remove scrape targets.
# Restart Prometheus after changes: make restart SERVICE=monitoring/grafana
# ===========================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:

  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: node-exporter
    static_configs:
      - targets: [node-exporter:9100]    # host metrics via node_exporter

  - job_name: cadvisor
    static_configs:
      - targets: [cadvisor:8080]         # Docker container metrics

  - job_name: dcgm-exporter
    static_configs:
      - targets: [dcgm-exporter:9400]    # GPU metrics

  # Add your homelab services here:
  # - job_name: opentranscribe
  #   static_configs:
  #     - targets: [opentranscribe-backend:8080]
  #   metrics_path: /metrics
