# ===========================================================================
# Gitea — Lightweight self-hosted Git service
# Ports: 3500 (web UI), 2222 (SSH)
# Docs: https://docs.gitea.com/installation/install-with-docker
#
# Full-featured Git hosting: repositories, issues, pull requests, CI/CD
# via Gitea Actions (GitHub Actions-compatible), packages registry, and more.
#
# Quick start:
#   1. cp .env.example .env
#   2. make up SERVICE=dev/gitea
#   3. Open http://<server-ip>:3500 and complete the installer
#   4. SSH clone URL: git@<server-ip>:2222:<user>/<repo>.git
# ===========================================================================

services:
  gitea-db:
    image: postgres:17-alpine
    container_name: gitea-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${GITEA_DBNAME:-gitea}
      POSTGRES_USER: ${GITEA_DBUSER:-gitea}
      POSTGRES_PASSWORD: ${GITEA_DBPASS}
    volumes:
      - gitea_db:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -d ${GITEA_DBNAME:-gitea} -U ${GITEA_DBUSER:-gitea}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - gitea_internal

  gitea:
    image: gitea/gitea:latest
    container_name: gitea
    restart: unless-stopped
    pull_policy: always
    depends_on:
      gitea-db:
        condition: service_healthy
    environment:
      TZ: ${TZ:-America/New_York}
      USER_UID: ${PUID:-1000}
      USER_GID: ${PGID:-1000}
      GITEA__database__DB_TYPE: postgres
      GITEA__database__HOST: gitea-db:5432
      GITEA__database__NAME: ${GITEA_DBNAME:-gitea}
      GITEA__database__USER: ${GITEA_DBUSER:-gitea}
      GITEA__database__PASSWD: ${GITEA_DBPASS}
      GITEA__server__HTTP_PORT: "3000"
      GITEA__server__SSH_PORT: "22"
      GITEA__server__SSH_LISTEN_PORT: "22"
      GITEA__server__DOMAIN: ${GITEA_DOMAIN:-localhost}
      GITEA__server__ROOT_URL: http://${GITEA_DOMAIN:-localhost}:${GITEA_PORT:-3500}
      GITEA__server__SSH_DOMAIN: ${GITEA_DOMAIN:-localhost}
      GITEA__mailer__ENABLED: "false"
    volumes:
      - ${DATA_PATH:-/mnt/nas/appdata}/gitea/data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "${GITEA_PORT:-3500}:3000"
      - "${GITEA_SSH_PORT:-2222}:22"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - gitea_internal
      - homelab

volumes:
  gitea_db:

networks:
  gitea_internal:
    driver: bridge
  homelab:
    external: true
